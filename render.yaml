services:
  - type: web
    name: gym-sport
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gym-sport-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: gym-sport-db
    plan: free
    region: oregon
